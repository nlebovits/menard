# Pre-commit hooks for docsync
# Install: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.13.9
    hooks:
      - id: commitizen
        stages: [commit-msg]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.6
    hooks:
      # Run the formatter
      - id: ruff-format
      
      # Run the linter
      - id: ruff
        args: [--fix]

  - repo: local
    hooks:
      # Type checking with ty
      - id: ty
        name: ty type check
        entry: uv run ty check
        language: system
        pass_filenames: false
        types: [python]

  - repo: local
    hooks:
      # Run tests with coverage check
      - id: pytest-coverage
        name: pytest with coverage
        entry: uv run pytest --cov=src/docsync --cov-fail-under=60 -q
        language: system
        pass_filenames: false
        always_run: true

      # Check for stale documentation
      - id: docsync-check
        name: docsync-check
        description: Check for stale documentation when code or docs change
        entry: uv run docsync check
        language: system
        pass_filenames: false
        always_run: true
