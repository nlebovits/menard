# .docsync/links.toml
# Code-to-documentation links for docsync itself
#
# Section-specific links enable precise staleness detection.
# When cli.py changes, only README.md#Commands is marked stale.

# === CLI and Commands ===
[[link]]
code = "src/docsync/cli.py"
docs = ["README.md#Commands", "README.md#Architecture"]

# === Core staleness detection ===
[[link]]
code = "src/docsync/staleness.py"
docs = ["README.md#Section-Level Staleness Detection", "README.md#Architecture"]

[[link]]
code = "src/docsync/sections.py"
docs = ["README.md#Section-Level Staleness Detection", "README.md#Architecture"]

# === Link management ===
[[link]]
code = "src/docsync/toml_links.py"
docs = ["README.md#Quick Start", "README.md#Architecture"]

[[link]]
code = "src/docsync/graph.py"
docs = ["README.md#Architecture"]

# === Import analysis ===
[[link]]
code = "src/docsync/imports.py"
docs = ["README.md#Architecture"]

# === Pre-commit hook ===
[[link]]
code = "src/docsync/hook.py"
docs = ["README.md#Quick Start", "README.md#Architecture"]

# === Configuration ===
[[link]]
code = "src/docsync/config.py"
docs = ["README.md#Configuration"]

# === Coverage reporting ===
[[link]]
code = "src/docsync/coverage.py"
