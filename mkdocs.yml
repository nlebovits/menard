site_name: docsync
site_description: Keep your code and documentation in sync
site_url: https://nlebovits.github.io/docsync/
repo_url: https://github.com/nlebovits/docsync
repo_name: nlebovits/docsync

theme:
  name: material
  logo: img/logo-white.svg
  favicon: img/favicon.png
  palette:
    # Light mode
    - scheme: default
      primary: deep purple  # #7730E1 brand color
      accent: lime          # #DBDF24 brand accent
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Dark mode
    - scheme: slate
      primary: deep purple
      accent: lime
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: true
            docstring_style: google
            show_root_heading: true
            show_signature_annotations: true

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration: configuration.md
  - Agent Skills: skills.md
  - CLI Reference: cli/reference.md
  - Contributing: contributing.md
